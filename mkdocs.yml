# Extensions
markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
        permalink: true
theme:
  name: 'material'
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      primary: 'cyan'
      accent: 'light green'
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: 'blue grey'
      accent: 'deep-orange'
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  font:
    text: 'Ubuntu'
    code: 'Ubuntu Mono'
  color_mode: 'auto'
  favicon: 'static/favicon.ico'
  icon:
    logo: material/notebook-edit-outline
    tag:
      id-python: material/language-python
      id-linux: material/linux
      id-ai: material/robot
      id-ansible: simple/ansible
      id-aws: fontawesome/brands/aws
      id-docker: simple/docker
      id-git: simple/git
      id-kubernetes: material/kubernetes
      id-windows: fontawesome/brands/windows
      id-books: material/book-open-variant
