  custom_dir: overrides
  language: 'en'
  features:
    # Enhanced navigation
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.expand

    # other enhancements
    - toc.follow
    
    # Content enhancements
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
    
    # Search improvements
    - search.suggest
    - search.highlight
